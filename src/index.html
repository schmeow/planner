<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Log</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <div id="app">
      <div id="daily-view">
        <div id="left-column">
          <div id="tasks-events">
            <div id="events-row">
              <p class="section-label">Events</p>
            </div>

            <div id="tasks-row">
              <p class="section-label">Tasks</p>
            </div>

          </div>

          <div id="daily-log">
            <p class="section-label">Daily Log</p>
            <textarea id="log-input" placeholder="Write about your day..."></textarea>
          </div>
        </div>

        <div id="right-column">
          <div id="mood-tracker">
            <p class="section-label">Mood</p>
            <div id="mood-tags">
              <button class="mood-tag" data-mood="great">Great</button>
              <button class="mood-tag" data-mood="happy">Happy</button>
              <button class="mood-tag" data-mood="average">Average</button>
              <button class="mood-tag" data-mood="upset">Upset</button>
              <button class="mood-tag" data-mood="tired">Tired</button>
              <button class="mood-tag" data-mood="sick">Sick</button>
              <button class="mood-tag" data-mood="sad">Sad</button>
              <button class="mood-tag" data-mood="awful">Awful</button>
              <button class="mood-tag" data-mood="stressed">Stressed</button>
            </div>
            <textarea id="mood-notes" placeholder="Add mood notes..."></textarea>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
